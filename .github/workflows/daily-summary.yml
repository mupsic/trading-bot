name: Daily Summary EOD

# EOD snapshot: equity, P&L, posiciones. Telegram resumen siempre.
# Schedule: 20:05 UTC weekdays = 4:05 PM EDT (5 min después del cierre NY).

on:
  schedule:
    - cron: '5 20 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-summary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: sudo apt-get install -y jq

      - run: chmod +x scripts/*.sh

      - name: Run daily summary
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET: ${{ secrets.ALPACA_API_SECRET }}
          ALPACA_BASE_URL: https://paper-api.alpaca.markets
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # OPERATING_CAPITAL no definido → el bot usa el equity real de la cuenta Alpaca
        run: bash scripts/daily-summary.sh

      - name: Commit memory updates
        run: |
          git config user.email "bot@tradingbot.local"
          git config user.name "Trading Bot"
          git add memory/
          git diff --staged --quiet || git commit -m "EOD snapshot $(date +%Y-%m-%d)"
          git pull --rebase origin main || git rebase --abort
          git push
