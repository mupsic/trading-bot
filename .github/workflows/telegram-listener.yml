name: Telegram Listener

# Polling Telegram para comandos del usuario (/status, /pause, /closeall, etc).
# 100% bash, NO Claude/Opus.
# Schedule: cada 5 minutos (mínimo permitido por GitHub Actions cron).

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  listener:
    runs-on: ubuntu-latest
    timeout-minutes: 2  # poll rápido, no tarda más
    steps:
      - uses: actions/checkout@v4

      - run: sudo apt-get install -y jq

      - run: chmod +x scripts/*.sh

      - name: Poll Telegram and execute commands
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET: ${{ secrets.ALPACA_API_SECRET }}
          ALPACA_BASE_URL: https://paper-api.alpaca.markets
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          OPERATING_CAPITAL: "3000"
        run: bash scripts/telegram-listener.sh

      - name: Commit state updates (telegram-state, bot-state)
        run: |
          git config user.email "bot@tradingbot.local"
          git config user.name "Trading Bot"
          git add memory/
          git diff --staged --quiet || git commit -m "telegram listener state $(date +%Y-%m-%dT%H:%M)"
          git pull --rebase origin main || git rebase --abort
          git push || true  # ok si race-condition (otro workflow pusheó); siguiente tick recoge
