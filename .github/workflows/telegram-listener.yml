name: Telegram Listener

# Listener de comandos Telegram (/status, /pause, /closeall, etc).
# NO usa polling continuo — se dispara exactamente después de cada rutina del bot.
# Esto cubre el 99% de los casos: el usuario reacciona a las notificaciones del bot.
#
# Para comandos de emergencia en cualquier momento:
#   → GitHub Actions UI → "Telegram Listener" → "Run workflow" (botón manual)

on:
  # Disparado automáticamente tras cada rutina principal del bot
  workflow_run:
    workflows:
      - "Pre-Market Research"
      - "Market-Open Execution"
      - "Midday Monitor"
      - "Daily Summary EOD"
      - "Weekly Review"
    types:
      - completed
  # Disponible manualmente para emergencias (pause, closeall, etc)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  listener:
    runs-on: ubuntu-latest
    timeout-minutes: 2  # poll rápido, no tarda más
    steps:
      - uses: actions/checkout@v4

      - run: sudo apt-get install -y jq

      - run: chmod +x scripts/*.sh

      - name: Poll Telegram and execute commands
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET: ${{ secrets.ALPACA_API_SECRET }}
          ALPACA_BASE_URL: https://paper-api.alpaca.markets
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          OPERATING_CAPITAL: "20000"
        run: bash scripts/telegram-listener.sh

      - name: Commit state updates (telegram-state, bot-state)
        run: |
          git config user.email "bot@tradingbot.local"
          git config user.name "Trading Bot"
          git add memory/
          git diff --staged --quiet || git commit -m "telegram listener state $(date +%Y-%m-%dT%H:%M)"
          git pull --rebase origin main || git rebase --abort
          git push || true  # ok si race-condition (otro workflow pusheó); siguiente tick recoge
